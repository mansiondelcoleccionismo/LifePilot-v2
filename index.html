<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LifePilot-v2/icon-512.png" />
    <link rel="apple-touch-icon" href="/LifePilot-v2/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>lifepilot-v2</title>
    <script>
      ;(function () {
        var t = localStorage.getItem('lifepilot-theme')
        var dark =
          t === 'dark' ||
          ((!t || t === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
